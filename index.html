<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Isaac Item Lookup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>The Binding of Isaac</h1>
  <div class="search-row">
    <input id="q" type="search" placeholder="Search items, trinkets, cards, pills..." autocomplete="off" autofocus>
    <button id="fav-only" class="icon-btn" type="button" title="Show only favorites" aria-pressed="false">★</button>
    <button id="toggle-filters" class="icon-btn" type="button" title="Hide filters" aria-pressed="true">▲</button>
  </div>
  <div class="filters" id="filters">
    <div class="presets-row">
      <select id="preset-select" title="Load saved filter preset">
        <option value="">— Load preset —</option>
      </select>
      <button id="preset-save" class="chip" type="button">Save current as preset</button>
      <button id="preset-delete" class="chip on" type="button" hidden>Delete preset</button>
      <button id="preset-clear" class="chip" type="button">Clear all filters</button>
    </div>
    <fieldset id="f-type">
      <legend>Type</legend>
    </fieldset>
    <fieldset id="f-dlc">
      <legend>DLC</legend>
    </fieldset>
    <fieldset id="f-quality">
      <legend>Quality</legend>
    </fieldset>
    <fieldset id="f-pool">
      <legend>Pool</legend>
    </fieldset>
  </div>
  <div id="status"></div>
</header>
<main>
  <ul id="results"></ul>
</main>
<script src="app.js" defer></script>
</body>
</html>
