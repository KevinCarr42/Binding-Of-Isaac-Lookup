<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Binding of Isaac Lookup</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='%23654730'><ellipse cx='50' cy='80' rx='40' ry='17'/><ellipse cx='50' cy='55' rx='29' ry='16'/><ellipse cx='50' cy='35' rx='19' ry='13'/><path d='M50 7 C58 17 57 27 50 33 C43 27 42 17 50 7 Z'/></g></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="search-row">
    <input id="q" type="search" placeholder="Search items, trinkets, cards, pills..." autocomplete="off" autofocus>
    <button id="only-toggle" class="icon-btn only-toggle" type="button" title="Show all" data-mode="all" aria-pressed="false">★</button>
    <button id="pool-quick" class="icon-btn pool-quick" type="button" title="All pools" data-mode="all"></button>
    <button id="clear-search" class="icon-btn clear-search" type="button" title="Clear search">Clear search</button>
    <button id="toggle-filters" class="icon-btn" type="button" title="Hide filters" aria-pressed="true">▲</button>
  </div>
  <div class="filters" id="filters">
    <div class="presets-row">
      <div>
        <select id="preset-select" title="Load saved filter preset">
          <option value="">— Load preset —</option>
        </select>
        <button id="preset-save" class="chip" type="button">Save current as preset</button>
        <button id="preset-delete" class="chip on" type="button" hidden>Delete preset</button>
        <button id="preset-clear" class="chip" type="button">Clear all filters</button>
      </div>
      <div>
        <select id="loadout-select" title="Load saved run loadout">
          <option value="">— Load loadout —</option>
        </select>
        <button id="loadout-save" class="chip" type="button">Save run as loadout</button>
        <button id="loadout-delete" class="chip on" type="button" hidden>Delete loadout</button>
        <button id="run-clear" class="chip" type="button" hidden>Clear current run</button>
      </div>
    </div>
    <fieldset id="f-pool" class="pool-collapsed">
      <legend>Pool</legend>
      <button id="pool-toggle" class="chip pool-action pool-toggle" type="button" title="Show pool filters" aria-expanded="false">▸</button>
      <button id="pool-all" class="chip pool-action" type="button" title="Select every pool">All</button>
      <button id="pool-none" class="chip pool-action" type="button" title="Clear pool selection">Clear</button>
    </fieldset>
    <fieldset id="f-type">
      <legend>Type</legend>
    </fieldset>
    <fieldset id="f-dlc">
      <legend>DLC</legend>
    </fieldset>
    <fieldset id="f-quality">
      <legend>Quality</legend>
    </fieldset>
    <fieldset id="f-view">
      <legend>View</legend>
    </fieldset>
    <fieldset id="f-sort">
      <legend>Sort</legend>
    </fieldset>
  </div>
</header>
<main>
  <div id="status"></div>
  <ul id="results"></ul>
</main>
<script src="app.js" defer></script>
</body>
</html>
